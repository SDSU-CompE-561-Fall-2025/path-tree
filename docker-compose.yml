version: "3.9"

services:
  db:
    image: postgres:15
    container_name: courseplanner-db
    environment:
      POSTGRES_USER: course_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-course_planner}
      POSTGRES_DB: course_planner
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course_planner -d course_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: courseplanner-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://course_planner:${POSTGRES_PASSWORD:-course_planner}@db:5432/course_planner
      POSTGRES_USER: course_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-course_planner}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: course_planner
      SECRET_KEY: ${SECRET_KEY}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: courseplanner-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./frontend:/app

volumes:
  db_data: