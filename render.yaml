services:
  - type: web
    name: courseplanner-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: courseplanner-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false  # set this manually to your Vercel URL after frontend is deployed

databases:
  - name: courseplanner-db
    plan: free
    databaseName: course_planner
    user: course_planner
